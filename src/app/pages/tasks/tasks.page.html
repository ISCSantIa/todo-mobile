<ion-header>
  <ion-toolbar>
    <ion-title>
      Tasks
    </ion-title>

    <ion-buttons slot="end">
      <ion-button routerLink="/categories">
        Categories
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let task of tasks; trackBy: trackByTask">
      <ion-checkbox slot="start" [checked]="task.completed" (ionChange)="toggleTask(task.id)">
      </ion-checkbox>
      <ion-label>
        <h2>
          {{task.title}}
        </h2>
        <p>
          {{getCategoryName(task.categoryId)}}
        </p>
        <p>
          {{task.completed ? 'Completada':'Pendiente'}}
        </p>
      </ion-label>
      <ion-button color="danger" slot="end" (click)="deleteTask(task.id)">
        Eliminar
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button id="open-task-modal">
      +
    </ion-fab-button>
  </ion-fab>

  <ion-modal trigger="open-task-modal" #modal>
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Nueva Tarea</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="modal.dismiss()">Cancelar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding">
        <ion-item>
          <ion-input label="Nombre de la tarea" labelPlacement="floating" placeholder="Ej. Estudiar Angular"
            [(ngModel)]="newTaskTitle">
          </ion-input>
        </ion-item>

        <h5 class="ion-padding-start ion-padding-top">Categoría</h5>
        <ion-list>
          <ion-radio-group [(ngModel)]="selectedCategoryId">

            <ion-item>
              <ion-radio [value]="null">Sin categoría</ion-radio>
            </ion-item>

            <ion-item *ngFor="let category of categories">
              <ion-radio [value]="category.id">{{ category.name }}</ion-radio>
            </ion-item>

          </ion-radio-group>
        </ion-list>

        <div class="ion-padding">
          <ion-button expand="block" (click)="saveTask(modal)">
            Guardar Tarea
          </ion-button>
        </div>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>

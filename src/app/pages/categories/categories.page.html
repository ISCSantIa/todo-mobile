<ion-header>
  <ion-toolbar>
    <ion-title>
      Categorías
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>
    <ion-item *ngFor="let category of categories">
      <ion-label>
        {{category.name}}
      </ion-label>
      <ion-button slot="end" color="danger" (click)="deleteCategory(category.id)">
        Eliminar
      </ion-button>
      <ion-button (click)="editCategory(category)">
        Editar
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="createCategory()">
      +
    </ion-fab-button>
  </ion-fab>

</ion-content>
